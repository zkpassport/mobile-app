name: Build & Submit (Preview)

jobs:
  build_android:
    type: build
    params:
      platform: android
      profile: preview

  build_ios:
    type: build
    params:
      platform: ios
      profile: preview

  # Android: Submit to Play Store (beta testers)
  # See: https://docs.expo.dev/eas/workflows/pre-packaged-jobs/#submit
  submit_android:
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: preview

  # iOS: Submit to TestFlight (internal and external testers)
  # See: https://docs.expo.dev/eas/workflows/pre-packaged-jobs/#testflight
  testflight_ios:
    type: testflight
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: preview
      external_groups: ['Beta']
      # changelog: |
      #   What's new in this release:
      #   - New features
      #   - Bug fixes
